<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}NovaCart{% endblock title %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100" style="background: linear-gradient(160deg, #eaf2fb 0%, #cfe0f5 50%, #a9c6ec 100%);">

  <nav class="navbar navbar-expand-lg" style="background-color: #1a1a2e;">
    <div class="container-fluid">
      <a class="navbar-brand text-light fw-bold fs-3" href="#">Nova<span class="text-danger">Cart</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-light active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light" href="#">Features</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light" href="#">Pricing</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light disabled" aria-disabled="true">Disabled</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>    

   <main class="flex-grow-1 text-center py-4 mt-4">
    {% block content %}
      <h1>Welcome to my website!</h1>
    {% endblock %}
   </main>

    <footer class="text-light text-center py-4" style="background-color: #1a1a2e;">
        {% block footer %}
            <p class="mb-1 fw-semibold">Nova<span class="text-danger">Cart</span></p>
            <p class="mb-0 opacity-75">© 2026 NovaCart. All rights reserved.</p>
        {% endblock %}
    </footer>

</body>
</html>
