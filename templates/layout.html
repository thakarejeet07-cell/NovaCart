<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}NovaCart{% endblock title %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100" style="background: linear-gradient(160deg, #eaf2fb 0%, #cfe0f5 50%, #a9c6ec 100%);">

<nav class="navbar navbar-expand-lg shadow-sm" style="background-color: #1a1a2e;">
    <div class="container-fluid d-flex align-items-center px-4">

      <a class="navbar-brand text-light fw-bold fs-3 flex-shrink-0" href="#">Nova<span class="text-danger">Cart</span></a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse d-flex" id="navbarNav">
        <form class="d-flex flex-grow-1 mx-4" role="search">
          <input class="form-control me-2 rounded-pill" type="search" placeholder="Search products..." aria-label="Search">
          <button class="btn btn-danger rounded-pill px-4" type="submit">Search</button>
        </form>
      </div>

      <ul class="navbar-nav flex-row flex-shrink-0 align-items-center">
        <li class="nav-item">
          <a class="nav-link text-light fw-semibold active" aria-current="page" href="{% url 'home' %}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-light fw-semibold ms-4" href="#">Category</a>
        </li>
        <li class="nav-item">
          <a class="btn btn-outline-light rounded-pill px-3 py-1 ms-4" href="#">Login</a>
        </li>
      </ul>

    </div>
</nav>

   <main class="flex-grow-1">
    {% block content %}
      <h1 class="text-center py-5">Welcome to my website!</h1>
    {% endblock %}
   </main>

    <footer class="text-light text-center py-4 mt-5" style="background-color: #1a1a2e;">
        {% block footer %}
            <p class="mb-1 fw-semibold fs-5">Nova<span class="text-danger">Cart</span></p>
            <p class="mb-0 opacity-75 small">© 2026 NovaCart. All rights reserved.</p>
        {% endblock %}
    </footer>

</body>
</html>
