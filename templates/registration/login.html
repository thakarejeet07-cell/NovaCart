{% extends "layout.html" %}

{% block title %}Login - NovaCart{% endblock title %}

{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="background-color: #f0e2db; min-height: 80vh;">
    <div style="width: 100%; max-width: 400px;">
        <h1 class="fw-bold mb-4" style="color: #14142b;">Login</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn fw-bold px-4 py-2 mt-3" style="background-color: #14142b; color: #f0e2db;">
                Login
            </button>
        </form>
        <p class="mt-3">
            Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
